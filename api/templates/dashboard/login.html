<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ChoBot Dashboard</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('dashboard.static', filename='css/dashboard.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="logo-box mx-auto mb-3" style="width:60px;height:60px;border-radius:18px;">
        <span class="d-flex align-items-center justify-content-center h-100 fs-3">🌿</span>
      </div>
      <h1 class="ac-font mb-1" style="color:var(--nook-green);font-size:1.8rem;">ChoBot</h1>
      <p class="x-small fw-bold text-uppercase letter-spacing-1" style="color:#aaa;">Moderator Dashboard</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert {% if category == 'error' %}alert-danger{% else %}alert-success{% endif %}
                     border-0 rounded-3 py-2 px-3 mb-3 shadow-sm" style="font-weight:700;font-size:.85rem;">
          <i class="bi {% if category == 'error' %}bi-exclamation-triangle-fill{% else %}bi-check-circle-fill{% endif %} me-1"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('dashboard.login') }}">
      <label class="db-label">Secret Key</label>
      <div class="input-group mb-3" style="border:2px solid #e1e6d3;border-radius:12px;overflow:hidden;background:var(--nook-cream);">
        <span class="input-group-text border-0" style="background:transparent;color:#aaa;">
          <i class="bi bi-key-fill"></i>
        </span>
        <input type="password" name="secret" autofocus
               placeholder="Enter mod secret key"
               class="form-control border-0 shadow-none"
               style="background:transparent;font-family:var(--font-main);font-weight:600;font-size:.9rem;color:#555;">
      </div>
      <button type="submit"
              class="btn btn-nook-primary w-100 py-2 rounded-3 fw-bold"
              style="font-size:.95rem;border-radius:14px!important;">
        <i class="bi bi-door-open-fill me-2"></i>Log In
      </button>
    </form>

    <p class="text-center x-small mt-4" style="color:#ccc;font-weight:700;">
      ChoBot &mdash; ACNH Island Management
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmEtmT49YJZBtX+mHJFsxnXMoaZX"
        crossorigin="anonymous"></script>
</body>
</html>
