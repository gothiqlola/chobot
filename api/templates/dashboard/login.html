<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ChoBot Dashboard</title>
  <!-- Tailwind Play CDN (development/internal use).
       The Play CDN is a dynamic script and does not support Subresource Integrity.
       For production deployments, replace with a pre-built Tailwind CSS bundle. -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-950 text-gray-100">
  <div class="w-full max-w-sm">

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-8">
        <div class="text-4xl mb-3">🌿</div>
        <h1 class="text-2xl font-bold text-white">ChoBot Dashboard</h1>
        <p class="text-sm text-gray-400 mt-1">Moderator access only</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm
            {% if category == 'error' %}bg-red-900/50 border border-red-700 text-red-300
            {% else %}bg-emerald-900/50 border border-emerald-700 text-emerald-300{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('dashboard.login') }}">
        <label class="block text-sm font-medium text-gray-300 mb-1">Secret Key</label>
        <input
          type="password"
          name="secret"
          autofocus
          placeholder="Enter mod secret key"
          class="w-full px-4 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-gray-100
                 placeholder-gray-500 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 text-sm"
        />
        <button
          type="submit"
          class="mt-4 w-full py-2.5 rounded-lg bg-teal-600 hover:bg-teal-500 text-white text-sm font-semibold transition"
        >
          Log In
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-600 mt-6">
      ChoBot &mdash; ACNH Island Management
    </p>
  </div>
</body>
</html>
